<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=440, initial-scale=1">
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; width: 440px; height: 280px; overflow: hidden; background: #111820; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: 100%; height: 100%; display: grid; grid-template-columns: 190px 1fr; align-items: center; padding: 32px 34px; border-bottom: 12px solid #f2c94c; }
      img { width: 158px; height: 158px; object-fit: contain; }
      h1 { margin: 0; font-size: 26px; line-height: 1.08; letter-spacing: 0; }
      p { margin: 14px 0 0; color: #cbd3dc; font-size: 14px; line-height: 1.45; }
      .accent { display: block; width: 42px; height: 5px; margin-bottom: 15px; background: #f2c94c; }
    </style>
  </head>
  <body>
    <main>
      <img src="../assets/icon-master.png" alt="">
      <div><span class="accent"></span><h1>X Yellow<br>Blocker</h1><p>识别 · 折叠 · 屏蔽</p></div>
    </main>
  </body>
</html>
