<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Yellow Blocker</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <h1>X Yellow Blocker</h1>
        <span id="status" class="status">已加载</span>
      </header>

      <section class="group switches" aria-label="基础开关">
        <label><input id="enabled" type="checkbox"> 启用检测</label>
        <label><input id="hideDetected" type="checkbox"> 命中后折叠推文</label>
        <label><input id="autoBlock" type="checkbox"> 自动加入 X 屏蔽</label>
      </section>

      <section class="group grid" aria-label="阈值">
        <label>
          <span>隐藏分</span>
          <input id="hideThreshold" type="number" min="1" max="100" step="1">
        </label>
        <label>
          <span>屏蔽分</span>
          <input id="autoBlockThreshold" type="number" min="1" max="100" step="1">
        </label>
        <label>
          <span>间隔 ms</span>
          <input id="blockDelayMs" type="number" min="500" max="15000" step="100">
        </label>
        <label>
          <span>本轮上限</span>
          <input id="maxBlocksPerSession" type="number" min="1" max="200" step="1">
        </label>
      </section>

      <section class="group" aria-label="白名单">
        <label for="whitelist">白名单</label>
        <textarea id="whitelist" spellcheck="false" rows="5" placeholder="@trusted_user"></textarea>
      </section>

      <section class="group" aria-label="关注保护">
        <label for="followedHandles">关注保护</label>
        <textarea id="followedHandles" spellcheck="false" rows="4" placeholder=""></textarea>
      </section>

      <section class="stats" aria-label="统计">
        <div><strong id="detected">0</strong><span>识别</span></div>
        <div><strong id="queued">0</strong><span>排队</span></div>
        <div><strong id="blocked">0</strong><span>已屏蔽</span></div>
        <div><strong id="failed">0</strong><span>失败</span></div>
      </section>

      <section class="group mute-sync" aria-label="X 屏蔽词同步">
        <div class="sync-heading">
          <span>X 屏蔽词</span>
          <span id="muteSyncProgress" class="sync-progress">未同步</span>
        </div>
        <div class="sync-actions">
          <button id="syncMuteWords" type="button">同步到当前 X 账号</button>
          <button id="cancelMuteWords" type="button" hidden>停止</button>
        </div>
        <div class="remote-row">
          <span id="remoteListStatus">远程名单未更新</span>
          <button id="refreshRemoteLists" type="button">更新名单</button>
        </div>
      </section>

      <section class="group community" aria-label="共享屏蔽账号">
        <label class="community-toggle"><input id="communitySharingEnabled" type="checkbox"> 匿名自动上报屏蔽账号</label>
        <p class="community-note" id="communityNote">开启后，你屏蔽的账号会通过 Cloudflare Worker 匿名上报，并立即同步到共享名单（任何人屏蔽都会同步）。</p>
        <div class="community-actions">
          <span id="communityStatus">未开启</span>
          <button id="submitCommunityReports" type="button" hidden>手动提交</button>
        </div>
      </section>

      <section class="group shared-list" aria-label="共享屏蔽名单">
        <div class="sync-heading">
          <span>共享屏蔽名单</span>
          <span id="sharedListCount" class="sync-progress">0 账号</span>
        </div>
        <p class="community-note">名单里的账号会被自动屏蔽。如果你认为某个账号是误判，点「误报」提交异议；累计 3 人异议后该账号会自动移出共享名单（自愈机制），之后需 2 人重新确认才会再次加入。</p>
        <div id="sharedList" class="shared-list-items"></div>
      </section>

      <footer>
        <button id="resetStats" type="button">清空统计</button>
        <button id="openX" type="button">打开 X</button>
      </footer>
    </main>

    <script src="../src/defaults.js"></script>
    <script src="../src/detector.js"></script>
    <script src="../src/mute-words.js"></script>
    <script src="../src/remote-lists.js"></script>
    <script src="../src/community-sharing.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
